<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Marker — Dark Theme</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f1117;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      background: #161b27;
      border-bottom: 1px solid #1e2d40;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #38bdf8;
      box-shadow: 0 0 8px #38bdf888;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #e2e8f0;
    }

    header span {
      font-size: 12px;
      color: #64748b;
      margin-left: auto;
    }

    #map {
      flex: 1;
    }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 28px;
      left: 16px;
      z-index: 999;
      background: #161b27ee;
      border: 1px solid #1e2d40;
      border-radius: 10px;
      padding: 12px 16px;
      backdrop-filter: blur(6px);
      min-width: 150px;
    }

    .legend-title {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Custom popup */
    .leaflet-popup-content-wrapper {
      background: #1e293b !important;
      border: 1px solid #334155 !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 32px #00000088 !important;
      color: #e2e8f0 !important;
    }

    .leaflet-popup-tip {
      background: #1e293b !important;
    }

    .leaflet-popup-content {
      margin: 12px 16px !important;
    }

    .popup-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .popup-coords {
      font-size: 11px;
      color: #64748b;
      font-family: monospace;
    }

    .popup-note {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
    }

    /* Leaflet dark tile attribution */
    .leaflet-control-attribution {
      background: #0f1117bb !important;
      color: #334155 !important;
      font-size: 10px !important;
    }

    .leaflet-control-attribution a {
      color: #475569 !important;
    }

    .leaflet-control-zoom a {
      background: #161b27 !important;
      color: #94a3b8 !important;
      border-color: #1e2d40 !important;
    }

    .leaflet-control-zoom a:hover {
      background: #1e293b !important;
      color: #e2e8f0 !important;
    }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>Friend Map Tracker</h1>
  <span>Edit markers.json → push ke Git → pull untuk update</span>
</header>

<div id="map"></div>

<script>
  const map = L.map('map', {
    center: [4.455, 97.972],
    zoom: 14,
    zoomControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  const markers = [
    {
      "name": "Mujib",
      "lat": 4.4539,
      "lng": 97.9675,
      "color": "#38bdf8",
      "note": "Lokasi Mujib"
    },
    {
      "name": "Hafiz",
      "lat": 5.5527,
      "lng": 95.3482,
      "color": "#a78bfa",
      "note": "Lokasi Hafiz"
    },
    {
      "name": "Firman",
      "lat": 4.4480,
      "lng": 97.9750,
      "color": "#34d399",
      "note": "Lokasi Firman"
    },
    {
    "name": "Mujib",
    "lat": 5.5536,
    "lng": 95.3170,
    "color": "#38bdf8",
    "note": "Masjid Raya Baitulrahman"
  },{
    "name": "Mujib",
    "lat": 5.5705,
    "lng": 95.3676,
    "color": "#38bdf8",
    "note": "Universitas Unsyiah(USK)"
  }
  ];

  function createIcon(color) {
    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="42" viewBox="0 0 32 42">
        <defs>
          <filter id="shadow">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="${color}" flood-opacity="0.5"/>
          </filter>
        </defs>
        <path d="M16 2 C8.3 2 2 8.3 2 16 C2 26 16 40 16 40 C16 40 30 26 30 16 C30 8.3 23.7 2 16 2 Z"
          fill="${color}" filter="url(#shadow)" />
        <circle cx="16" cy="16" r="6" fill="#0f1117" />
        <circle cx="16" cy="16" r="3" fill="${color}" />
      </svg>`;
    return L.divIcon({
      html: svg,
      className: '',
      iconSize: [32, 42],
      iconAnchor: [16, 42],
      popupAnchor: [0, -44]
    });
  }

  const bounds = [];

  markers.forEach(m => {
    const icon = createIcon(m.color);
    const marker = L.marker([m.lat, m.lng], { icon }).addTo(map);

    marker.bindPopup(`
      <div class="popup-name" style="color:${m.color}">${m.name}</div>
      <div class="popup-coords">${m.lat.toFixed(4)}, ${m.lng.toFixed(4)}</div>
      <div class="popup-note">${m.note}</div>
    `);

    bounds.push([m.lat, m.lng]);
  });

  if (bounds.length > 1) {
    map.fitBounds(bounds, { padding: [60, 60] });
  }

  const legend = document.createElement('div');
  legend.className = 'legend';
  legend.innerHTML = `<div class="legend-title">Members</div>` +
    markers.map(m => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${m.color};box-shadow:0 0 6px ${m.color}66;"></div>
        ${m.name}
      </div>`).join('');
  document.body.appendChild(legend);
</script>
</body>
</html>
